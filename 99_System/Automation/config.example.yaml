vault_path: "/home/ubuntu/family-intelligence-vault"
timezone: "Asia/Shanghai"

git:
  branch: "main"
  remote: "origin"
  allowed_add_paths:
    - "00_Inbox/Hermes/"
    - "00_Inbox/Ideas/"
    - "00_Inbox/Questions/"
    - "00_Inbox/Reading/"
    - "00_Inbox/AI_Processed/To_Review/"
    - "05_Output/Daily_Briefings/"
    - "05_Output/Weekly_Reviews/"
    - "99_System/Automation/logs/"
  protected_paths:
    - "01_Journal/"
    - "02_Sources/"
    - "03_Knowledge/"
    - "04_Insights/"
    - "05_Output/Reports/"
    - "05_Output/Articles/"
    - "05_Output/Memos/"
    - "06_Graph/"
    - "07_Assets/"
    - "90_Archive/"

hermes:
  enabled: true
  news_enabled: true
  captures_enabled: true
  daily_briefing_enabled: true
  weekly_review_enabled: true

ai_processing:
  enabled: false
  provider: ""
  model: ""
  output_dir: "00_Inbox/AI_Processed/To_Review/"

logging:
  log_dir: "99_System/Automation/logs/"
  level: "INFO"
