services:
  family-intelligence-agent:
    build: .
    container_name: family-intelligence-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OBSIDIAN_VAULT_PATH: /app/obsidian_output
    volumes:
      - ./data:/app/data
      - ./obsidian_output:/app/obsidian_output
    command: ["python", "main.py", "schedule"]
